id: w_fix_010
group: w_fix
version: 1
title: incorrect json escape in webhook signer
languages:
  - python
prompt: |
  `app/webhooks/signer.py` builds the canonical request body for HMAC
  signing by `json.dumps(payload)` with default settings, but the
  upstream verifier expects `ensure_ascii=False` and sorted keys,
  so any payload containing non-ASCII characters or unsorted keys
  fails signature verification. Align the signer with the verifier's
  canonical form, add a regression test using a payload with a CJK
  string and out-of-order keys, and run the test suite.
expected:
  min_files:
    - "tests/test_webhook_signer.py"
  must_pass_tests:
    - "pytest -q tests/test_webhook_signer.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/webhooks/signer.py"}
    reads: ["file:app/webhooks/signer.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/webhooks/signer.py"}
    reads: []
    writes: ["file:app/webhooks/signer.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_webhook_signer.py"}
    reads: []
    writes: ["file:tests/test_webhook_signer.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_webhook_signer.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
