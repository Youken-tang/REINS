id: w_fix_005
group: w_fix
version: 1
title: file handle leak in CSV importer
languages:
  - python
prompt: |
  `app/importers/csv_importer.py` opens the source file with `open()`
  but never closes it on the early-return error paths, so long-running
  processes leak descriptors and eventually hit `EMFILE`. Refactor the
  open calls to use a context manager (or an explicit close in
  `finally`), add a test that verifies no descriptor is leaked across
  one good import + one failing import, and run the suite.
expected:
  min_files:
    - "tests/test_csv_importer_leak.py"
  must_pass_tests:
    - "pytest -q tests/test_csv_importer_leak.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/importers/csv_importer.py"}
    reads: ["file:app/importers/csv_importer.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/importers/csv_importer.py"}
    reads: []
    writes: ["file:app/importers/csv_importer.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_csv_importer_leak.py"}
    reads: []
    writes: ["file:tests/test_csv_importer_leak.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_csv_importer_leak.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
