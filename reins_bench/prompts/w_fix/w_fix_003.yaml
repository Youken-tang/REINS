id: w_fix_003
group: w_fix
version: 1
title: timezone-naive datetime in API response
languages:
  - python
prompt: |
  The `/api/events` endpoint serialises `event.created_at` with
  `datetime.utcnow()` and no timezone info, so clients in non-UTC
  zones display events one offset off. Make the timestamps explicitly
  UTC-aware on the wire (ISO-8601 with `Z` or `+00:00`), add a test
  that pins the JSON shape, and run the test suite.
expected:
  min_files:
    - "tests/test_events_timezone.py"
  must_pass_tests:
    - "pytest -q tests/test_events_timezone.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/api/events.py"}
    reads: ["file:app/api/events.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/api/events.py"}
    reads: []
    writes: ["file:app/api/events.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_events_timezone.py"}
    reads: []
    writes: ["file:tests/test_events_timezone.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_events_timezone.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
