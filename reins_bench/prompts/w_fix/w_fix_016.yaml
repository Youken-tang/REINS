id: w_fix_016
group: w_fix
version: 1
title: TOCTOU race in temp file creation
languages:
  - python
prompt: |
  `app/utils/tempfile_helper.py` checks `os.path.exists(path)` and then
  calls `open(path, "w")` if missing — a classic TOCTOU window where
  two concurrent processes both pass the check and one overwrites the
  other's data. Switch to `os.open(path, os.O_CREAT | os.O_EXCL | os.O_WRONLY)`
  (or `tempfile.NamedTemporaryFile`), add a regression test that races
  two threads and asserts only one succeeds, and run the test suite.
expected:
  min_files:
    - "tests/test_tempfile_toctou.py"
  must_pass_tests:
    - "pytest -q tests/test_tempfile_toctou.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/utils/tempfile_helper.py"}
    reads: ["file:app/utils/tempfile_helper.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/utils/tempfile_helper.py"}
    reads: []
    writes: ["file:app/utils/tempfile_helper.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_tempfile_toctou.py"}
    reads: []
    writes: ["file:tests/test_tempfile_toctou.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_tempfile_toctou.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
