id: w_fix_029
group: w_fix
version: 1
title: missing CSRF token check on state-changing endpoint
languages:
  - python
prompt: |
  `app/api/profile.py` exposes a POST `/profile/email` endpoint with
  no CSRF token verification, so a malicious site can change a
  victim's email by submitting a form while the user is logged in.
  Add CSRF token validation (compare cookie + header, time-constant
  comparison), return HTTP 403 on mismatch, add a regression test
  for both valid + missing token paths, and run the test suite.
expected:
  min_files:
    - "tests/test_profile_csrf.py"
  must_pass_tests:
    - "pytest -q tests/test_profile_csrf.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/api/profile.py"}
    reads: ["file:app/api/profile.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/api/profile.py"}
    reads: []
    writes: ["file:app/api/profile.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_profile_csrf.py"}
    reads: []
    writes: ["file:tests/test_profile_csrf.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_profile_csrf.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
