id: w_fix_018
group: w_fix
version: 1
title: timezone confusion in scheduled job
languages:
  - python
prompt: |
  `app/jobs/scheduler.py` mixes `datetime.now()` (naive, server-local) and
  `datetime.now(timezone.utc)` when comparing the next-run time against
  «now», so jobs fire 8 hours early or late depending on host TZ. Pin
  every datetime path to UTC-aware, add a regression test that simulates
  a non-UTC host and asserts the next-run computation is correct, and
  run the test suite.
expected:
  min_files:
    - "tests/test_scheduler_tz.py"
  must_pass_tests:
    - "pytest -q tests/test_scheduler_tz.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/jobs/scheduler.py"}
    reads: ["file:app/jobs/scheduler.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/jobs/scheduler.py"}
    reads: []
    writes: ["file:app/jobs/scheduler.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_scheduler_tz.py"}
    reads: []
    writes: ["file:tests/test_scheduler_tz.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_scheduler_tz.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
