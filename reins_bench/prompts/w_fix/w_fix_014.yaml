id: w_fix_014
group: w_fix
version: 1
title: silent UnicodeDecodeError on log ingest
languages:
  - python
prompt: |
  `app/ingest/file_reader.py` reads incoming log files with
  `open(path).read()` (default platform encoding), so files written
  by upstream services in UTF-8 with non-ASCII bytes raise
  `UnicodeDecodeError` on Latin-1 hosts and the ingest worker
  silently skips the rest of the batch. Pin the open call to
  `encoding="utf-8"` with `errors="replace"` (or another deliberate
  policy), add a regression test that feeds a UTF-8 sample
  containing CJK characters and asserts the contents round-trip,
  and run the test suite.
expected:
  min_files:
    - "tests/test_file_reader_encoding.py"
  must_pass_tests:
    - "pytest -q tests/test_file_reader_encoding.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/ingest/file_reader.py"}
    reads: ["file:app/ingest/file_reader.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/ingest/file_reader.py"}
    reads: []
    writes: ["file:app/ingest/file_reader.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_file_reader_encoding.py"}
    reads: []
    writes: ["file:tests/test_file_reader_encoding.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_file_reader_encoding.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
