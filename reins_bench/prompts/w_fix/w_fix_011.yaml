id: w_fix_011
group: w_fix
version: 1
title: retry loop swallows non-retriable errors
languages:
  - python
prompt: |
  `app/clients/payment_client.py` wraps every API call in a generic
  retry-on-exception loop, so non-retriable errors (validation errors,
  hard 4xx) are retried until the budget is exhausted and only then
  surfaced as a generic timeout. Restrict retries to genuinely
  transient classes (network errors, 5xx, explicit retry signals),
  re-raise other exceptions immediately, add a regression test that
  asserts a 422 is raised on the first attempt, and run the test
  suite.
expected:
  min_files:
    - "tests/test_payment_client_retry.py"
  must_pass_tests:
    - "pytest -q tests/test_payment_client_retry.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/clients/payment_client.py"}
    reads: ["file:app/clients/payment_client.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/clients/payment_client.py"}
    reads: []
    writes: ["file:app/clients/payment_client.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_payment_client_retry.py"}
    reads: []
    writes: ["file:tests/test_payment_client_retry.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_payment_client_retry.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
