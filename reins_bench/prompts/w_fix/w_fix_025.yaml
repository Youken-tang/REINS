id: w_fix_025
group: w_fix
version: 1
title: signed-token verification skips expiry check
languages:
  - python
prompt: |
  `app/auth/token.py` verifies a JWT signature but accidentally drops
  the `verify_exp=True` flag when refactoring to PyJWT v2 — so expired
  tokens still authenticate. Restore expiry verification, add a
  regression test that crafts a token with `exp` in the past and
  asserts `decode()` raises `ExpiredSignatureError`, and run the
  test suite.
expected:
  min_files:
    - "tests/test_token_expiry.py"
  must_pass_tests:
    - "pytest -q tests/test_token_expiry.py"
  forbidden_patterns:
    - "TODO: implement"
    - "raise NotImplementedError"
budget:
  max_wall_seconds: 600
  max_input_tokens: 120000
  max_output_tokens: 30000
ground_truth_resource_access:
  - tool: read_file
    args: {path: "app/auth/token.py"}
    reads: ["file:app/auth/token.py"]
    writes: []
    side_effect_level: none
  - tool: write_file
    args: {path: "app/auth/token.py"}
    reads: []
    writes: ["file:app/auth/token.py"]
    side_effect_level: local
  - tool: write_file
    args: {path: "tests/test_token_expiry.py"}
    reads: []
    writes: ["file:tests/test_token_expiry.py"]
    side_effect_level: local
  - tool: run_tests
    args: {command: "pytest -q tests/test_token_expiry.py"}
    reads: ["dir:."]
    writes: []
    side_effect_level: external
notes:
